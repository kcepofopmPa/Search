<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1E1E1E">
<meta name="referrer" content="no-referrer">
<link rel="manifest" href="manifest.json">
<title>Encar Search</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#1E1E1E;--s1:#252525;--s2:#2E2E2E;--s3:#373737;
  --bdr:#3A3A3A;--bdr2:#454545;
  --txt:#ECECEC;--muted:#9A9A9A;--dim:#666;
  --accent:#E8640A;--accent-dim:#E8640A20;--accent-light:#FF8033;
  --blue:#6BA3D6;--blue-dim:#6BA3D615;
  --orange:#E8640A;--orange-dim:#E8640A15;
  --green:#4CAF7D;--green-dim:#4CAF7D15;
  --red:#D95F5F;
  --r:10px;--rsm:7px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;overflow-x:hidden}
.hdr{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-size:17px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:6px}
.logo-dot{color:var(--accent)}
.mode-pills{display:flex;background:var(--s2);border-radius:20px;padding:3px;border:1px solid var(--bdr)}
.pill{padding:5px 14px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;transition:all .2s}
.pill.on{background:var(--accent);color:#fff}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bdr);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;padding:9px 4px 11px;display:flex;flex-direction:column;align-items:center;font-size:10px;color:var(--muted);border:none;background:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;gap:2px;transition:color .2s}
.nb.on{color:var(--accent)}
.ni{font-size:19px}
.view{display:none;padding-bottom:75px}
.view.on{display:block}
.sp{padding:14px 16px}
.ai-box{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:4px}
.ai-top{padding:10px 14px 0;display:flex;align-items:center;gap:6px}
.ai-ico{font-size:13px;color:var(--accent)}
.ai-lbl{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px}
.ai-ta{width:100%;background:none;border:none;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:14px;padding:10px 14px 12px;resize:none;min-height:72px;outline:none;line-height:1.5}
.ai-ta::placeholder{color:var(--dim)}
.ai-footer{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bdr)}
.ai-hint{font-size:10px;color:var(--dim)}
.ai-go{padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s}
.ai-go:active{opacity:.7}
.ai-go:disabled{opacity:.4;cursor:not-allowed}
.parsed-box{margin-bottom:14px;background:var(--s1);border:1px solid var(--bdr);border-left:2px solid var(--accent);border-radius:var(--rsm);padding:10px 12px;display:none}
.parsed-box.on{display:block}
.pb-title{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.pb-tags{display:flex;flex-wrap:wrap;gap:4px}
.pt{display:inline-flex;align-items:center;gap:3px;background:var(--s3);border-radius:4px;padding:3px 8px}
.pt-k{font-size:10px;color:var(--muted)}
.pt-v{font-size:10px;color:var(--blue);font-family:'JetBrains Mono',monospace;font-weight:500}
.or{display:flex;align-items:center;gap:8px;margin:12px 0;color:var(--dim);font-size:10px;font-weight:700}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--bdr)}
.ss{display:none}
.ss.on{display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg-full{grid-column:1/-1}
.fl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
select.fi,input.fi{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:13px;padding:9px 11px;outline:none;-webkit-appearance:none;transition:border-color .2s}
select.fi:focus,input.fi:focus{border-color:var(--accent)}
input.fi::placeholder{color:var(--dim)}
.go-btn{width:100%;margin-top:14px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .2s}
.go-btn:active{opacity:.8}
.go-btn:disabled{opacity:.4;cursor:not-allowed}
.rh{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.rc{font-size:12px;color:var(--muted)}
.rc b{color:var(--accent)}
.sort-sel{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:11px;padding:5px 8px;outline:none;-webkit-appearance:none}
.cars{padding:8px 16px}
.cc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.sl{position:relative;aspect-ratio:16/9;background:var(--s2);overflow:hidden}
.sl-track{display:flex;height:100%;transition:transform .3s}
.sl-item{min-width:100%;height:100%}
.sl-item img{width:100%;height:100%;object-fit:cover}
.sl-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--dim)}
.sl-btn{position:absolute;top:50%;transform:translateY(-50%);width:26px;height:26px;background:rgba(0,0,0,.65);border:none;border-radius:50%;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.sl-btn.p{left:7px}.sl-btn.n{right:7px}
.sl-cnt{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:2px 6px;border-radius:8px;z-index:2;font-family:'JetBrains Mono',monospace}
.sl-dots{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:2}
.sd{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.35);transition:background .2s}
.sd.on{background:var(--accent)}
.cb{padding:11px 13px}
.ct{font-size:14px;font-weight:700;letter-spacing:-.3px;margin-bottom:1px}
.cba{font-size:11px;color:var(--muted);margin-bottom:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cs{display:flex;background:var(--s2);border-radius:var(--rsm);overflow:hidden;margin-bottom:9px}
.csi{flex:1;text-align:center;padding:7px 4px;border-right:1px solid var(--bdr)}
.csi:last-child{border-right:none}
.csv{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.csl{font-size:9px;color:var(--dim);margin-top:1px;text-transform:uppercase;letter-spacing:.4px}
.pr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.pu{font-size:21px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:-1px}
.prr{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.fav{width:34px;height:34px;background:var(--s3);border:1px solid var(--bdr);border-radius:7px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fav.on{background:var(--orange-dim);border-color:var(--orange)}
.air{background:var(--s3);border-left:2px solid var(--blue);border-radius:0 var(--rsm) var(--rsm) 0;padding:8px 10px;margin-bottom:9px;display:none}
.air.on{display:block}
.airl{font-size:9px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.airt{font-size:12px;line-height:1.5}
.cbtns{display:flex;gap:6px}
.cb2{flex:1;padding:8px;border-radius:var(--rsm);border:1px solid var(--bdr);background:var(--s2);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:3px}
.cb2.prim{background:var(--accent);color:#fff;border-color:var(--accent)}
.cb2.blue{color:var(--blue);border-color:var(--bdr2)}
.cb2.dis{opacity:.5;pointer-events:none}
.ld{display:none;padding:50px 16px;text-align:center}
.ld.on{display:block}
.spin{width:36px;height:36px;border:2px solid var(--bdr2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{color:var(--muted);font-size:13px}
.ld-sub{color:var(--dim);font-size:10px;margin-top:3px;font-family:'JetBrains Mono',monospace}
.emp{display:none;padding:60px 20px;text-align:center}
.emp.on{display:block}
.emp-ico{font-size:44px;margin-bottom:10px}
.emp-t{font-size:15px;font-weight:700;margin-bottom:5px}
.emp-s{font-size:12px;color:var(--muted);line-height:1.5}
.cw{margin:10px 16px;background:var(--orange-dim);border:1px solid var(--orange);border-radius:var(--rsm);padding:10px 12px;font-size:11px;color:var(--orange);display:none;line-height:1.5}
.cw.on{display:block}
.sw{padding:16px}
.st{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin:0 0 10px}
.scard{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.srow{padding:11px 13px;border-bottom:1px solid var(--bdr)}
.srow:last-child{border-bottom:none}
.srl{font-size:12px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.srs{font-size:10px;color:var(--muted);margin-bottom:6px;line-height:1.4}
.si{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 11px;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--accent)}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--dim)}
.sdot.ok{background:var(--green)}
.sv-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.about{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;font-size:11px;color:var(--muted);line-height:1.7;margin-top:4px}
.about b{color:var(--txt)}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--bdr2);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1}
.car-spec-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.spec-tag{display:inline-flex;align-items:center;background:var(--s3);border:1px solid var(--bdr);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.spec-engine{color:var(--accent);border-color:var(--accent)}
.spec-dim{color:var(--blue)}
.bf-row{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;border-bottom:1px solid var(--bdr);scrollbar-width:none;-ms-overflow-style:none}
.bf-row::-webkit-scrollbar{display:none}
.bf-btn{flex-shrink:0;padding:5px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:14px;color:var(--muted);font-size:11px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.bf-btn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}
.badge-group-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.bg-btn{padding:5px 10px;background:var(--s2);border:1px solid var(--bdr);border-radius:6px;color:var(--muted);font-size:11px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.bg-btn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">encar<span class="logo-dot" style="color:var(--accent)">.</span>ai</div>
  <div class="mode-pills">
    <button class="pill on" id="pAI" onclick="setMode('ai')">&#x1F9E0; AI</button>
    <button class="pill" id="pST" onclick="setMode('struct')">&#x2699;&#xFE0F; &#x424;&#x438;&#x43B;&#x44C;&#x442;&#x440;&#x44B;</button>
  </div>
</div>

<div class="bnav">
  <button class="nb on" id="nSearch" onclick="goView('search')"><div class="ni">&#x1F50D;</div>&#x41F;&#x43E;&#x438;&#x441;&#x43A;</button>
  <button class="nb" id="nResults" onclick="goView('results')"><div class="ni">&#x1F697;</div>&#x410;&#x432;&#x442;&#x43E;</button>
  <button class="nb" id="nFavs" onclick="goView('favs')"><div class="ni">&#x2764;&#xFE0F;</div>&#x418;&#x437;&#x431;&#x440;&#x430;&#x43D;&#x43D;&#x43E;&#x435;</button>
  <button class="nb" id="nSettings" onclick="goView('settings')"><div class="ni">&#x2699;&#xFE0F;</div>&#x41D;&#x430;&#x441;&#x442;&#x440;&#x43E;&#x439;&#x43A;&#x438;</button>
</div>

<div id="toastEl" class="toast"></div>

</body>
</html>
